# Backward-compatible filename for the canonical flat PCLA wrapper config.
# See config_example.yaml for all supported keys and docs/configuration.md for
# precedence, validation, and legacy nested-config behavior.
pcla_agent: carl_plant_3
pcla_root: /app/PCLA-wrapper/PCLA
route_xml_path: null
route_waypoint_distance: 2.0
route_draw: false

launch_carla_server: true
carla_connect_timeout_seconds: 30.0
retry_interval_seconds: 2.0
carla_timeout: 10.0

sync: true
no_rendering: true
xodr_root: /mnt/map/xodr
reuse_generated_world: true
manage_traffic_manager_sync: false

ego_role_name: hero
ego_bp_id: vehicle.tesla.model3
spawn_z_offset: 3.0

coordinate_y_sign: -1.0
yaw_sign: -1.0
steer_sign: -1.0
yaw_offset_deg: 0.0
object_identity_mode: stateless
action_none_timeout_seconds: 0.0
